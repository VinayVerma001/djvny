<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DJ VNY Track Manager</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  font-family:Poppins;
  background:#111;
  color:white;
  padding:40px;
}

input, button {
  width:100%;
  margin:8px 0;
  padding:10px;
}

button {
  background:#ff0055;
  color:white;
  border:none;
  cursor:pointer;
}

.track-item {
  background:#1a1a1a;
  padding:10px;
  margin-top:10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
}
</style>
</head>

<body>

<h2>DJ VNY Track Manager</h2>

<input type="password" id="password" placeholder="Admin Password">
<button onclick="login()">Login</button>

<div id="panel" style="display:none">

<h3>Add New Track</h3>
<input id="trackTitle" placeholder="Track Title">
<input id="mp3Link" placeholder="MP3 Download Link">
<input id="thumbFile" placeholder="Thumbnail file name (example: song1.jpg)">
<button onclick="addTrack()">Add Track</button>

<hr>

<h3>Manage Tracks</h3>
<div id="trackList"></div>

</div>

<script>
const PASSWORD = "djvny123";

function login(){
  if(document.getElementById("password").value === PASSWORD){
    document.getElementById("panel").style.display="block";
    loadTracks();
  } else alert("Wrong Password");
}

function addTrack(){
  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];

  tracks.push({
    title: trackTitle.value,
    thumbnail: "thumbnails/" + thumbFile.value.trim(),
    mp3: mp3Link.value
  });

  localStorage.setItem("tracks", JSON.stringify(tracks));

  trackTitle.value="";
  mp3Link.value="";
  thumbFile.value="";

  loadTracks();
}

function loadTracks(){
  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
  const list = document.getElementById("trackList");
  list.innerHTML="";

  tracks.forEach((track,index)=>{
    const div = document.createElement("div");
    div.className="track-item";
    div.innerHTML=`
      <span>${track.title}</span>
      <button onclick="deleteTrack(${index})">Delete</button>
    `;
    list.appendChild(div);
  });
}

function deleteTrack(index){
  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
  tracks.splice(index,1);
  localStorage.setItem("tracks", JSON.stringify(tracks));
  loadTracks();
}
</script>

</body>
</html>
