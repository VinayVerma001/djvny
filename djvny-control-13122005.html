<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DJ VNY Master Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
body {
  font-family: Poppins;
  background:#111;
  color:white;
  padding:40px;
}
input, textarea, button {
  width:100%;
  margin:8px 0;
  padding:10px;
}
button {
  background:#ff0055;
  color:white;
  border:none;
}
.section {
  background:#1a1a1a;
  padding:20px;
  margin-bottom:20px;
}
</style>
</head>

<body>

<h1>DJ VNY Website Control Panel</h1>

<div class="section">
<h2>Basic Settings</h2>
<input id="logo" placeholder="Website Logo Text">
<input id="heroTitle" placeholder="Hero Title">
<input id="heroSubtitle" placeholder="Hero Subtitle">
<input id="heroImage" placeholder="Hero Background Image URL">
<input id="primaryColor" placeholder="Primary Color (e.g. #ff0055)">
<input id="youtube" placeholder="YouTube Link">
<input id="spotify" placeholder="Spotify Link">
<textarea id="about" placeholder="About Text"></textarea>
<input id="footer" placeholder="Footer Text">
<button onclick="saveSettings()">Save Website Settings</button>
</div>

<div class="section">
<h2>Add Track</h2>
<input id="trackTitle" placeholder="Track Title">
<input id="youtubeLink" placeholder="YouTube Link">
<input id="mp3Link" placeholder="MP3 Link">
<button onclick="addTrack()">Add Track</button>
</div>

<script>
const PASSWORD = "djvny123";

if(prompt("Enter Admin Password") !== PASSWORD){
  document.body.innerHTML = "Access Denied";
}

function saveSettings(){
  const settings = {
    logo: logo.value,
    heroTitle: heroTitle.value,
    heroSubtitle: heroSubtitle.value,
    heroImage: heroImage.value,
    primaryColor: primaryColor.value,
    youtube: youtube.value,
    spotify: spotify.value,
    about: about.value,
    footer: footer.value
  };

  localStorage.setItem("siteSettings", JSON.stringify(settings));
  alert("Website Updated!");
}

function extractID(url){
  const reg = /(?:youtube\.com\/.*v=|youtu\.be\/)([^&]+)/;
  const match = url.match(reg);
  return match ? match[1] : null;
}

function addTrack(){
  const videoId = extractID(youtubeLink.value);
  if(!videoId) return alert("Invalid YouTube Link");

  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
  tracks.push({
    title: trackTitle.value,
    thumbnail: `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`,
    mp3: mp3Link.value
  });

  localStorage.setItem("tracks", JSON.stringify(tracks));
  alert("Track Added!");
}
</script>

</body>
</html>
