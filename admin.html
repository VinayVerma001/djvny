<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ VNY Admin Panel</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: #0f0f0f;
  color: white;
}

.login-box, .admin-panel {
  max-width: 800px;
  margin: 80px auto;
  background: #1a1a1a;
  padding: 40px;
  border-radius: 10px;
  box-shadow: 0 0 30px rgba(255,0,85,0.2);
}

h1, h2 {
  text-align: center;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  background: #111;
  border: 1px solid #333;
  color: white;
  border-radius: 5px;
}

button {
  padding: 10px 20px;
  border: none;
  background: #ff0055;
  color: white;
  border-radius: 5px;
  cursor: pointer;
  margin-top: 10px;
}

button:hover {
  background: #ff3377;
}

.track-item {
  background: #111;
  padding: 15px;
  margin: 15px 0;
  border-radius: 5px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.delete-btn {
  background: red;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div class="login-box" id="loginBox">
  <h1>DJ VNY Admin Login</h1>
  <input type="password" id="password" placeholder="Enter Admin Password">
  <button onclick="login()">Login</button>
</div>

<!-- ADMIN PANEL -->
<div class="admin-panel hidden" id="adminPanel">
  <h1>Admin Dashboard</h1>

  <h2>Artist Bio</h2>
  <textarea id="bioText" rows="4"></textarea>
  <button onclick="saveBio()">Save Bio</button>

  <hr>

  <h2>Add New Track</h2>
  <input type="text" id="trackTitle" placeholder="Track Title">
  <input type="text" id="trackDesc" placeholder="Track Description">
  <input type="text" id="trackLink" placeholder="MP3 Download Link">
  <button onclick="addTrack()">Add Track</button>

  <hr>

  <h2>Manage Tracks</h2>
  <div id="trackList"></div>
</div>

<script>
const ADMIN_PASSWORD = "djvny123"; // change this

function login() {
  const pass = document.getElementById("password").value;
  if (pass === ADMIN_PASSWORD) {
    document.getElementById("loginBox").classList.add("hidden");
    document.getElementById("adminPanel").classList.remove("hidden");
    loadData();
  } else {
    alert("Wrong Password");
  }
}

function loadData() {
  const bio = localStorage.getItem("bio") || "";
  document.getElementById("bioText").value = bio;

  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
  const list = document.getElementById("trackList");
  list.innerHTML = "";

  tracks.forEach((track, index) => {
    const div = document.createElement("div");
    div.className = "track-item";
    div.innerHTML = `
      <div>
        <strong>${track.title}</strong><br>
        ${track.description}
      </div>
      <button class="delete-btn" onclick="deleteTrack(${index})">Delete</button>
    `;
    list.appendChild(div);
  });
}

function saveBio() {
  const bio = document.getElementById("bioText").value;
  localStorage.setItem("bio", bio);
  alert("Bio Updated!");
}

function addTrack() {
  const title = document.getElementById("trackTitle").value;
  const desc = document.getElementById("trackDesc").value;
  const link = document.getElementById("trackLink").value;

  if (!title || !link) {
    alert("Title and Link required");
    return;
  }

  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
  tracks.push({ title: title, description: desc, mp3: link });
  localStorage.setItem("tracks", JSON.stringify(tracks));

  document.getElementById("trackTitle").value = "";
  document.getElementById("trackDesc").value = "";
  document.getElementById("trackLink").value = "";

  loadData();
}

function deleteTrack(index) {
  const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
  tracks.splice(index, 1);
  localStorage.setItem("tracks", JSON.stringify(tracks));
  loadData();
}
</script>

</body>
</html>
