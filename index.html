<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DJ VNY | Official Website</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>

<body>

<nav class="navbar">
  <div class="logo">DJ VNY</div>
  <ul>
    <li><a href="#about">About</a></li>
    <li><a href="#music">Music</a></li>
    <li><a href="#downloads">Downloads</a></li>
    <li><a href="https://youtube.com/@DJ_VNY?sub_confirmation=1" target="_blank">YouTube</a></li>
    <li><a href="https://open.spotify.com/artist/4BdYeDNwFbmtB4uXeJmRw1" target="_blank">Spotify</a></li>
  </ul>
</nav>

<header class="hero">
  <div class="hero-overlay">
    <h1>Feel The Beat</h1>
    <p>Official Website of DJ VNY</p>
    <a href="#downloads" class="btn">Download Tracks</a>
  </div>
</header>

<section id="about" class="section">
  <h2>About DJ VNY</h2>
  <p id="about-text"></p>
</section>

<section id="music" class="section dark">
  <h2>Latest Video</h2>
  <iframe src="https://www.youtube.com/embed?listType=user_uploads&list=DJ_VNY"
  frameborder="0" allowfullscreen></iframe>
</section>

<section id="downloads" class="section">
  <h2>MP3 Downloads</h2>
  <div class="cards" id="track-container"></div>
</section>

<footer>
  <p>© 2026 DJ VNY. All Rights Reserved.</p>
</footer>

<script>
const tracks = JSON.parse(localStorage.getItem("tracks")) || [];
const container = document.getElementById("track-container");

if (tracks.length === 0) {
  container.innerHTML = "<p>No tracks available.</p>";
} else {
  tracks.forEach(track => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${track.thumbnail}" class="thumb">
      <h3>${track.title}</h3>
      <a href="${track.mp3}" class="btn" download>Download</a>
    `;
    container.appendChild(card);
  });
}

const bio = localStorage.getItem("bio");
if (bio) document.getElementById("about-text").innerText = bio;
</script>

</body>
</html>
